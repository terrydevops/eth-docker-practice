# local ethereum network, two independent EL/CL pairs
#
#   pair A (validating): besu + teku (64 interop validators in-process)
#   pair B (archive):    geth --gcmode=archive + lighthouse
#
# pairs peer over EL p2p (besu is the bootnode) and CL p2p (teku static-dials
# lighthouse's pre-generated identity and keeps retrying; the ENR sidecar is
# the secondary path). client diversity across pairs is deliberate: a
# consensus bug in one client cannot take out both.
#
# ports: besu rpc :8545 | archive rpc :8547 | archive gateway :8548 | teku rest :5051

services:

  init-geth:
    image: "${GETH_IMAGE}"
    entrypoint: ["/bin/sh", "-c"]
    # idempotent: skip when the datadir is already initialized (a running geth
    # holds the lock, and re-running init against it must not fail the stack)
    command: ['[ -d /data/geth/chaindata ] && echo "already initialized" || exec geth --datadir=/data --state.scheme=hash init /execution/genesis.json']
    volumes: ["geth-data:/data", "./execution:/execution"]

  # ---------------- pair A: validating ----------------
  besu:
    image: "${BESU_IMAGE}"
    container_name: besu
    environment:
      - BESU_OPTS=-Xmx1g
    # besu advertises 127.0.0.1 to peers by default and --p2p-host only takes
    # an address, not a name - so it advertises its own container IP, resolved
    # at startup. without this geth connects once from the enode in .env and
    # never reconnects after a restart, because rediscovery hands it localhost.
    entrypoint:
      - sh
      - -c
      - exec /opt/besu/bin/besu --p2p-host="$$(hostname -i | tr -d ' ')" "$$@"
      - besu
    command:
      - --data-path=/data
      - --genesis-file=/config/besu-genesis.json
      - --node-private-key-file=/config/besu-node.key
      - --sync-mode=FULL
      - --data-storage-format=BONSAI
      - --engine-rpc-enabled=true
      - --engine-jwt-secret=/jwt/pair-a.hex
      - --engine-host-allowlist=*
      - --host-allowlist=*
      - --rpc-http-enabled=true
      - --rpc-http-host=0.0.0.0
      - --rpc-http-api=ETH,NET,WEB3,TXPOOL,ADMIN
      - --p2p-port=30303
      - --metrics-enabled=true
      - --metrics-host=0.0.0.0
      - --metrics-port=9545
      # full category set so the production "Besu Full" dashboard has data
      - --metrics-category=BLOCKCHAIN,ETHEREUM,EXECUTORS,JVM,NETWORK,PEERS,PROCESS,RPC,SYNCHRONIZER,TRANSACTION_POOL,KVSTORE_ROCKSDB,PRUNER,BLOCK_PROCESSING
    ports: ["8545:8545"]
    volumes:
      - besu-data:/data
      - ./config:/config
      - ./jwt:/jwt

  teku:
    image: "${TEKU_IMAGE}"
    container_name: teku
    user: "0:0"   # named volume is root-owned; devnet-only convenience
    environment:
      - JAVA_OPTS=-Xmx1g
    command:
      - --log-destination=CONSOLE
      - --data-base-path=/data
      - --network=/config/cl-config.yaml
      - --initial-state=/config/genesis.ssz
      - --ee-endpoint=http://besu:8551
      - --ee-jwt-secret-file=/jwt/pair-a.hex
      - --Xstartup-target-peer-count=0
      - --validators-proposer-default-fee-recipient=0x123463a4B065722E99115D6c222f267d9cABb524
      - --rest-api-enabled=true
      - --rest-api-interface=0.0.0.0
      - --rest-api-host-allowlist=*
      - --p2p-port=9000
      - --p2p-static-peers=${LIGHTHOUSE_MULTIADDR}
      - --metrics-enabled=true
      - --metrics-interface=0.0.0.0
      - --metrics-host-allowlist=*
      - --metrics-port=8008
    ports: ["5051:5051"]
    volumes:
      - teku-data:/data
      - ./config:/config
      - ./jwt:/jwt
    depends_on:
      - besu

  # validator client: prysm vc via the standard beacon REST api.
  # interop devnet keys are built into prysm; teku bn stays the consensus node.
  prysm-validator:
    image: "${PRYSM_VALIDATOR_IMAGE}"
    container_name: prysm-validator
    command:
      - --datadir=/data
      - --chain-config-file=/config/cl-config.yaml
      - --enable-beacon-rest-api
      - --beacon-rest-api-provider=http://teku:5051
      - --interop-num-validators=64
      - --interop-start-index=0
      - --suggested-fee-recipient=0x123463a4B065722E99115D6c222f267d9cABb524
      - --accept-terms-of-use
      - --monitoring-host=0.0.0.0
      - --monitoring-port=8081
    volumes:
      - teku-vc-data:/data
      - ./config:/config
    depends_on:
      - teku

  # ---------------- pair B: archive ----------------
  geth:
    image: "${GETH_IMAGE}"
    container_name: geth
    environment:
      - BESU_ENODE=${BESU_ENODE}
    # two devnet-specific fixes before geth starts:
    #  --nat extip: without it geth advertises 127.0.0.1 and besu drops a peer
    #    announcing a loopback endpoint.
    #  admin_addPeer: --bootnodes only seeds discovery, and on a two-node
    #    network discovery has nobody to gossip with, so geth never dials.
    #    static-nodes.json is gone in this version, so register over IPC once
    #    the node is up - geth keeps a static peer redialled from then on.
    entrypoint:
      - sh
      - -c
      - |
        (
          peer=$$(echo "$$BESU_ENODE" | sed "s/@besu:/@$$(getent hosts besu | awk '{print $$1}'):/")
          until geth attach --exec "admin.addPeer(\"$$peer\")" /data/geth.ipc 2>/dev/null | grep -q true; do
            sleep 5
          done
          echo "static peer registered: besu"
        ) &
        exec geth --nat="extip:$$(hostname -i | tr -d ' ')" "$$@"
      - geth
    command:
      - --datadir=/data
      - --networkid=32382
      - --nodekeyhex=${GETH_NODEKEY}
      - --bootnodes=${BESU_ENODE}
      # archive configuration, the point of this node
      - --gcmode=archive
      - --state.scheme=hash
      - --syncmode=full
      - --history.transactions=0
      - --http
      - --http.addr=0.0.0.0
      - --http.vhosts=*
      - --http.api=eth,net,web3,debug,txpool
      - --authrpc.addr=0.0.0.0
      - --authrpc.vhosts=*
      - --authrpc.jwtsecret=/jwt/pair-b.hex
      - --metrics
      - --metrics.addr=0.0.0.0
      - --metrics.port=6060
    ports: ["8547:8545"]
    volumes:
      - geth-data:/data
      - ./jwt:/jwt
    depends_on:
      init-geth:
        condition: service_completed_successfully

  # fetches teku's ENR once its rest api is up, hands it to lighthouse
  enr-sidecar:
    image: curlimages/curl:8.10.1
    user: "0:0"   # named volume is root-owned
    command: >
      sh -c 'until curl -sf http://teku:5051/eth/v1/node/identity -o /shared/id.json;
      do sleep 2; done;
      sed -e "s/.*\"enr\":\"//" -e "s/\".*//" /shared/id.json > /shared/enr.txt;
      pid=$$(sed -e "s/.*\"peer_id\":\"//" -e "s/\".*//" /shared/id.json);
      echo "/dns4/teku/tcp/9000/p2p/$$pid" > /shared/multiaddr.txt;
      echo "enr: $(cat /shared/enr.txt)"; echo "multiaddr: $(cat /shared/multiaddr.txt)";
      sleep 30'
    volumes: ["shared:/shared"]
    depends_on:
      - teku

  lighthouse:
    image: "${LIGHTHOUSE_IMAGE}"
    container_name: lighthouse
    entrypoint:
      - sh
      - -c
      - >
        until [ -s /shared/multiaddr.txt ]; do sleep 2; done;
        sleep 10;
        mkdir -p /data/beacon/network;
        cp -f /config/lighthouse-node.key /data/beacon/network/key;
        exec lighthouse bn
        --testnet-dir=/config
        --boot-nodes="$(cat /shared/enr.txt),$(cat /shared/multiaddr.txt)"
        --trusted-peers="$(sed 's|.*/p2p/||' /shared/multiaddr.txt)"
        --execution-endpoint=http://geth:8551
        --execution-jwt=/jwt/pair-b.hex
        --validator-monitor-auto
        --datadir=/data
        --port=9000
        --disable-upnp
        --disable-packet-filter
        --enable-private-discovery
        --target-peers=4
        --http
        --http-address=0.0.0.0
        --metrics
        --metrics-address=0.0.0.0
        --metrics-port=5054
    volumes:
      - lighthouse-data:/data
      - ./config:/config
      - ./jwt:/jwt
      - shared:/shared
    depends_on:
      - enr-sidecar
      - geth

  # remote-signing VC on the archive pair: keys live in web3signer (separate
  # compose project, same docker network), so the archive pair also stakes.
  # contrast with prysm-validator on pair A, which signs locally.
  remote-vc:
    image: "${TEKU_IMAGE}"
    container_name: remote-vc
    user: "0:0"   # named volume is root-owned; devnet-only convenience
    environment:
      - JAVA_OPTS=-Xmx512m
    command:
      - validator-client
      - --log-destination=CONSOLE
      - --data-base-path=/data
      - --network=/config/cl-config.yaml
      - --beacon-node-api-endpoint=http://lighthouse:5052
      - --validators-external-signer-url=http://web3signer:9000
      - --validators-external-signer-public-keys=external-signer
      - --validators-proposer-default-fee-recipient=0x123463a4B065722E99115D6c222f267d9cABb524
      - --metrics-enabled=true
      - --metrics-interface=0.0.0.0
      - --metrics-port=8008
      - --metrics-host-allowlist=*
    volumes:
      - remote-vc-data:/data
      - ./config:/config
    depends_on:
      - lighthouse

  # rpc gateway in front of the archive node: the SLO measurement point.
  # routes debug_/trace_ to a strictly-capped heavy pool, health-checks with
  # a real JSON-RPC call. config in gateway/haproxy.cfg
  gateway:
    image: "${HAPROXY_IMAGE:-haproxy:3.4.2-alpine}"
    container_name: gateway
    restart: unless-stopped
    ports: ["8548:8548", "8406:8406"]
    volumes:
      - ./gateway/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - geth
      - health-sidecar
    mem_limit: 64m

  # freshness sidecar: compares geth's head to besu's and drives the gateway's
  # agent-check, so a lagging archive node sheds traffic gradually. exposes a
  # demo override to inject synthetic lag. config in gateway/health-sidecar.mjs
  health-sidecar:
    image: "${PROBER_IMAGE:-node:26.5.0-alpine}"
    container_name: health-sidecar
    restart: unless-stopped
    command: ["node", "/app/health-sidecar.mjs"]
    volumes:
      - ./gateway/health-sidecar.mjs:/app/health-sidecar.mjs:ro
    depends_on:
      - geth
    mem_limit: 64m

  # synthetic prober: emits availability/latency SLIs per method class and
  # the correctness checks, scraped by prometheus (see monitoring/metrics/
  # prometheus/slo-rules.yml for the SLO computed from them)
  prober:
    image: "${PROBER_IMAGE:-node:26.5.0-alpine}"
    container_name: prober
    restart: unless-stopped
    command: ["node", "/app/prober.mjs"]
    volumes:
      - ./scripts/prober.mjs:/app/prober.mjs:ro
    depends_on:
      - gateway
    mem_limit: 128m

volumes:
  besu-data:
  remote-vc-data:
  teku-vc-data:
  teku-data:
  geth-data:
  lighthouse-data:
  shared:

networks:
  default:
    name: ${NET_NAME:-eth-devnet-network}
