# rpc gateway in front of the archive node. this is the SLO measurement
# point: availability and latency are defined here, not at the node.
# point reads and heavy traces go to separate pools so one pathological
# trace cannot starve compliance reads (see the README, Architecture and operations).
#
# two-tier freshness gating, because "answers" != "answers correctly":
#   - httpchk asks eth_syncing and requires result:false. a node actively
#     syncing still answers eth_blockNumber, but with a stale head - this
#     catches that and marks it down.
#   - agent-check (the health-sidecar) compares geth's head to besu's and
#     returns a weight, so a node drifting behind sheds traffic *gradually*
#     rather than all-or-nothing. in EKS this logic becomes a readiness probe.

global
    log stdout format raw local0 info
    maxconn 1024

defaults
    mode http
    log global
    option httplog
    timeout connect 5s
    timeout client 60s
    timeout server 60s

frontend rpc
    bind :8548
    option http-buffer-request
    # method-class routing: debug_/trace_ calls go to the heavy pool
    acl is_heavy req.body -m reg (debug_|trace_)
    use_backend archive_heavy if is_heavy
    default_backend archive_point

# health check is eth_syncing, not eth_blockNumber: a node that is up but
# still syncing returns a sync-progress object instead of `false`, and is
# marked down. a synced node returns "result":false and stays in rotation.
# agent-check adds graded weighting on top: the sidecar returns 100% / 50% /
# down as geth's lag against besu grows.
backend archive_point
    option httpchk
    http-check send meth POST uri / ver HTTP/1.1 hdr Host geth hdr Content-Type application/json body "{\"jsonrpc\":\"2.0\",\"method\":\"eth_syncing\",\"params\":[],\"id\":1}"
    http-check expect rstring "\"result\":false"
    server geth1 geth:8545 check inter 2s fall 3 rise 2 maxconn 64 weight 100 agent-check agent-addr health-sidecar agent-port 9999 agent-inter 2s

backend archive_heavy
    timeout server 120s
    option httpchk
    http-check send meth POST uri / ver HTTP/1.1 hdr Host geth hdr Content-Type application/json body "{\"jsonrpc\":\"2.0\",\"method\":\"eth_syncing\",\"params\":[],\"id\":1}"
    http-check expect rstring "\"result\":false"
    # strict concurrency cap: traces queue rather than saturate the node
    server geth1 geth:8545 check inter 2s fall 3 rise 2 maxconn 2 weight 100 agent-check agent-addr health-sidecar agent-port 9999 agent-inter 2s

# stats page for observing server state / weight (used by the lag-shedding demo)
frontend stats
    bind :8406
    stats enable
    stats uri /
    stats refresh 5s

frontend metrics
    bind :8405
    http-request use-service prometheus-exporter if { path /metrics }
    no log
