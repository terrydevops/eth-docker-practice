# rpc gateway in front of the archive node. this is the SLO measurement
# point: availability and latency are defined here, not at the node.
# point reads and heavy traces go to separate pools so one pathological
# trace cannot starve compliance reads (see docs/archive-node-operations.md §2).

global
    log stdout format raw local0 info
    maxconn 1024

defaults
    mode http
    log global
    option httplog
    timeout connect 5s
    timeout client 60s
    timeout server 60s

frontend rpc
    bind :8548
    option http-buffer-request
    # method-class routing: debug_/trace_ calls go to the heavy pool
    acl is_heavy req.body -m reg (debug_|trace_)
    use_backend archive_heavy if is_heavy
    default_backend archive_point

# health check is a real JSON-RPC call, not a tcp probe: a node that accepts
# connections but cannot answer eth_blockNumber is down as far as the SLO
# is concerned.
backend archive_point
    option httpchk
    http-check send meth POST uri / ver HTTP/1.1 hdr Host geth hdr Content-Type application/json body "{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}"
    http-check expect rstring result
    server geth1 geth:8545 check inter 2s fall 3 rise 2 maxconn 64

backend archive_heavy
    timeout server 120s
    option httpchk
    http-check send meth POST uri / ver HTTP/1.1 hdr Host geth hdr Content-Type application/json body "{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}"
    http-check expect rstring result
    # strict concurrency cap: traces queue rather than saturate the node
    server geth1 geth:8545 check inter 2s fall 3 rise 2 maxconn 2

frontend metrics
    bind :8405
    http-request use-service prometheus-exporter if { path /metrics }
    no log
