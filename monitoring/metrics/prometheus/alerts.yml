# alerting rules, grouped by observability layer (machine -> container ->
# chain). the SLO layer lives in slo-rules.yml next to its recording rules.
# severity: page = wake someone up, ticket = fix during working hours.

groups:
  # ---- machine (node-exporter) --------------------------------------------
  - name: machine
    rules:
      # the way archive nodes actually die: disk full. alert on projected
      # days-to-full, not a static percentage (see the README, Operations plan)
      - alert: HostDiskWillFillSoon
        expr: >
          predict_linear(node_filesystem_avail_bytes{fstype=~"ext4|xfs|btrfs"}[6h],
            7 * 24 * 3600) < 0
        for: 30m
        labels:
          severity: page
        annotations:
          summary: "disk projected to fill within 7 days at current growth"
      - alert: HostDiskSpaceLow
        expr: >
          node_filesystem_avail_bytes{fstype=~"ext4|xfs|btrfs"}
          / node_filesystem_size_bytes{fstype=~"ext4|xfs|btrfs"} < 0.10
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "filesystem under 10% free space"
      - alert: HostOutOfMemory
        expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes < 0.10
        for: 5m
        labels:
          severity: ticket
        annotations:
          summary: "host memory under 10% available"
      - alert: HostHighCpu
        expr: 1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) > 0.90
        for: 15m
        labels:
          severity: ticket
        annotations:
          summary: "host cpu above 90% for 15 minutes"

  # ---- containers (cadvisor) ----------------------------------------------
  - name: containers
    rules:
      - alert: ContainerOomKilled
        expr: increase(container_oom_events_total[10m]) > 0
        labels:
          severity: ticket
        annotations:
          summary: "container hit an OOM kill in the last 10 minutes"
      # working set close to the configured memory limit = next OOM candidate.
      # the limit filter excludes unlimited containers (limit reported as huge)
      - alert: ContainerMemoryNearLimit
        expr: >
          container_memory_working_set_bytes{name!=""}
          / (container_spec_memory_limit_bytes{name!=""} != 0) > 0.90
          and container_spec_memory_limit_bytes{name!=""} < 1e15
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "container above 90% of its memory limit"

  # ---- chain (client + validator metrics) ---------------------------------
  - name: chain
    rules:
      # node is up but its archive head trails the validating head
      - alert: ArchiveNodeLagging
        expr: (sum(ethereum_blockchain_height) - sum(chain_head_block)) > 5
        for: 30s
        labels:
          severity: page
        annotations:
          summary: "archive node >5 blocks behind the validating node"
          description: "historical queries are returning stale state"

      # archive node's metrics endpoint is gone (crashed / stopped)
      - alert: ArchiveNodeDown
        expr: up{job="geth"} == 0
        for: 30s
        labels:
          severity: page
        annotations:
          summary: "archive node is not being scraped (down or unreachable)"

      # any other node process down. pages faster than the symptom alerts
      # below it: a dead validator client stalls the chain ~2 minutes later
      - alert: NodeDown
        expr: up{job=~"besu|teku|lighthouse|prysm-validator|remote-vc|web3signer"} == 0
        for: 1m
        labels:
          severity: page
        annotations:
          summary: "node process {{ $labels.job }} is not being scraped"

      # chain not advancing at all - whole network stalled
      - alert: ChainStalled
        expr: increase(ethereum_blockchain_height[2m]) == 0
        for: 1m
        labels:
          severity: page
        annotations:
          summary: "validating node head has not advanced in 2 minutes"

      # validators are missing duties: penalties are accruing right now
      - alert: AttestationsStalling
        expr: max(beacon_slot{job="teku"}) - max(validator_last_attested_slot) > 4
        for: 2m
        labels:
          severity: page
        annotations:
          summary: "validators have not attested for >4 slots"

      # finality not advancing - network-wide symptom. scoped to the CL
      # clients (the validator client exports the same metric as a constant
      # 0), and gated on finality existing at all: a brand-new chain has no
      # finality for its first epochs, and that is ChainStalled's job anyway
      - alert: FinalityStalled
        expr: >
          max(increase(beacon_finalized_epoch{job=~"teku|lighthouse"}[15m])) == 0
          and
          max(beacon_finalized_epoch{job=~"teku|lighthouse"}) > 0
        for: 5m
        labels:
          severity: ticket
        annotations:
          summary: "finalized epoch has not advanced in 15 minutes"

  # ---- besu, the java execution client ------------------------------------
  # the generic NodeDown/ChainStalled rules cover "besu is gone" and "the
  # whole chain stopped". these cover the ways besu degrades while still up:
  # it falls behind, loses its peers, or its JVM starts thrashing.
  - name: besu
    rules:
      # besu reports its own sync state as a boolean. a node that is up but
      # not in sync is serving stale answers and, if it stakes, building on
      # the wrong head. gate on the chain having peers so this does not fire
      # during the first seconds after a restart.
      - alert: BesuNotInSync
        expr: besu_synchronizer_in_sync == 0
        for: 3m
        labels:
          severity: page
        annotations:
          summary: "besu is up but not in sync with the chain head"

      # the execution-layer peer count going to zero is the failure we already
      # hit once: blocks keep arriving over the engine API so the node looks
      # healthy, while transaction gossip is dead. current-peers, not the
      # connected_total counter, which only ever increases.
      - alert: BesuNoPeers
        expr: sum(besu_peers_peer_count_by_client{job="besu"}) == 0
        for: 5m
        labels:
          severity: ticket
        annotations:
          summary: "besu has no execution-layer peers - tx gossip is isolated"

      # besu is a JVM client, and GC pauses are its characteristic way of
      # missing slot deadlines: it is technically up while stop-the-world
      # pauses make it skip block production or attestation windows. alert on
      # time spent in GC per second - above ~10% means real pause pressure.
      - alert: BesuGcPressure
        expr: sum(rate(jvm_gc_collection_seconds_sum{job="besu"}[5m])) > 0.1
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "besu JVM spends >10% of wall-clock in garbage collection"

      # heap approaching the -Xmx ceiling is what precedes GC thrashing and
      # eventually an OOM kill (which presents as an unexplained restart).
      - alert: BesuHeapHigh
        expr: >
          sum(jvm_memory_used_bytes{job="besu",area="heap"})
          / sum(jvm_memory_max_bytes{job="besu",area="heap"}) > 0.9
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "besu JVM heap above 90% of its -Xmx ceiling"

  # ---- geth, the go execution client (archive node) -----------------------
  # generic NodeDown/ArchiveNodeDown cover "geth is gone". these cover how a
  # go client degrades while up: it stops keeping up with execution, its
  # goroutines leak, or the CL stops feeding it finality. note these are the
  # go-runtime failures - the JVM heap/GC alerts that besu needs do not apply.
  - name: geth
    rules:
      # geth exposes head as three separate metrics: header downloaded, block
      # executed, receipt written. in a healthy node they are equal. header
      # running ahead of block means headers are arriving but execution is
      # falling behind - the node is degrading before it looks "down".
      - alert: GethExecutionFallingBehind
        expr: (chain_head_header{job="geth"} - chain_head_block{job="geth"}) > 5
        for: 3m
        labels:
          severity: page
        annotations:
          summary: "geth has downloaded headers it has not executed (>5 blocks behind)"

      # the CL feeds finality over the engine API. if geth's finalized head
      # stops advancing while the chain itself is fine, the engine-API link to
      # lighthouse is the problem, not the chain. gated on finality existing.
      - alert: GethFinalityNotAdvancing
        expr: >
          increase(chain_head_finalized{job="geth"}[15m]) == 0
          and chain_head_finalized{job="geth"} > 0
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "geth finalized head has not advanced in 15m - check the engine API to lighthouse"

      # goroutines are go's concurrency units. a steadily climbing count is
      # the classic go leak - some operation is blocking and never releasing.
      # geth idles around ~130; a sustained climb past 2000 is pathological.
      - alert: GethGoroutineLeak
        expr: system_cpu_goroutines{job="geth"} > 2000
        for: 15m
        labels:
          severity: ticket
        annotations:
          summary: "geth goroutine count above 2000 and sustained - possible leak"

      # geth's scheduler latency rising means goroutines are waiting for CPU:
      # the node is saturated and cannot keep up with block processing. this
      # is geth's equivalent of besu's GC pressure - a different runtime, the
      # same symptom of "up but too slow to meet deadlines".
      - alert: GethSchedulerLatencyHigh
        expr: rate(system_cpu_schedlatency{job="geth"}[5m]) > 1e8
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "geth scheduler latency climbing - CPU saturated, block processing may lag"

  # ---- remote signing: web3signer + the teku VC on the archive pair --------
  - name: remote-signing
    rules:
      # a prevented signing means something ASKED to double-sign - almost
      # always two VCs loaded with the same keys. the protection worked, but
      # the misconfiguration must be found before someone runs a VC without it
      - alert: SlashingProtectionTriggered
        expr: increase(eth2_slashingprotection_prevented_signings_total[5m]) > 0
        labels:
          severity: page
        annotations:
          summary: "web3signer refused a signature: a double-sign was attempted"

      # duties are due every epoch; a slow signer starts missing slots well
      # before it is actually down
      - alert: SigningLatencyHigh
        expr: >
          rate(signing_bls_signing_duration_sum[5m])
          / rate(signing_bls_signing_duration_count[5m]) > 0.5
        for: 5m
        labels:
          severity: ticket
        annotations:
          summary: "web3signer BLS signing p_avg above 500ms"

      # the remote VC's only view of the chain is lighthouse's event stream;
      # flapping here silently degrades duties before anything is "down"
      - alert: RemoteVcEventStreamFlapping
        expr: increase(validator_event_stream_disconnections_total{job="remote-vc"}[10m]) > 3
        labels:
          severity: ticket
        annotations:
          summary: "remote VC keeps losing the beacon node event stream"

      # pair-B twin of AttestationsStalling: teku's VC does not export
      # validator_last_attested_slot, so watch performed duties instead.
      # attestation duty comes every epoch (~3.2min) - 15m of silence while
      # the signer holds active keys means duties are being missed
      - alert: RemoteVcDutiesStalled
        expr: >
          sum(increase(validator_duties_performed_total{job="remote-vc"}[15m])) == 0
          and
          signing_signers_loaded_count > 0
        labels:
          severity: page
        annotations:
          summary: "remote VC performed no duties in 15 minutes"

  # ---- per-validator view, from lighthouse --validator-monitor-auto -------
  # the SLO alerts catch aggregate effectiveness; these name the individual
  # validator, which is what an operator actually needs to act on
  - name: validator-monitor
    rules:
      # inclusion distance drives the reward multiplier: an attestation
      # included 2+ slots late earns materially less than one included next
      # slot. degrades long before anything looks "down"
      - alert: ValidatorAttestationInclusionSlow
        expr: avg_over_time(validator_monitor_attestation_in_block_delay_slots{validator!="total"}[15m]) > 2
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "validator {{ $labels.validator }} attestations included >2 slots late"

      # balance going down over an hour means penalties exceed rewards:
      # the validator is missing duties, not just earning slowly
      - alert: ValidatorBalanceDecreasing
        expr: delta(validator_monitor_balance_gwei{validator!="total"}[1h]) < 0
        for: 15m
        labels:
          severity: ticket
        annotations:
          summary: "validator {{ $labels.validator }} balance decreased over the last hour"

  # ---- meta: the measurement pipeline itself ------------------------------
  - name: monitoring-meta
    rules:
      # the delivery path. an alertmanager that is down means every other
      # alert in this file is firing into nothing - this one is the reason
      # the rest can be trusted
      - alert: AlertmanagerDown
        expr: up{job="alertmanager"} == 0
        for: 2m
        labels:
          severity: page
        annotations:
          summary: "alertmanager is down - alerts are not being delivered"

      # prometheus dropping its own scrapes, or falling behind on rules,
      # degrades every signal here before anything looks broken
      - alert: PrometheusRuleEvaluationFailing
        expr: increase(prometheus_rule_evaluation_failures_total[10m]) > 0
        labels:
          severity: ticket
        annotations:
          summary: "prometheus failed to evaluate rules in the last 10 minutes"

      - alert: PrometheusTargetScrapesFailing
        expr: increase(prometheus_target_scrapes_sample_out_of_order_total[10m]) > 0
          or increase(prometheus_target_scrapes_exceeded_body_size_limit_total[10m]) > 0
        labels:
          severity: ticket
        annotations:
          summary: "prometheus is rejecting samples from a target"

      # alertmanager accepted a notification but could not deliver it
      - alert: AlertNotificationsFailing
        expr: increase(alertmanager_notifications_failed_total[15m]) > 0
        labels:
          severity: page
        annotations:
          summary: "alertmanager failed to deliver notifications to {{ $labels.integration }}"

      # if the gateway or prober is gone the SLO is unmeasured - flying blind
      # is worse than a false page
      - alert: SloMeasurementBlind
        expr: up{job=~"gateway|rpc-prober"} == 0
        for: 2m
        labels:
          severity: ticket
        annotations:
          summary: "SLO measurement pipeline down ({{ $labels.job }}) - availability/latency SLIs are blind"
      - alert: CollectorDown
        expr: up{job=~"node-exporter|cadvisor"} == 0
        for: 5m
        labels:
          severity: ticket
        annotations:
          summary: "observability collector {{ $labels.job }} is down"
