global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml
  - /etc/prometheus/slo-rules.yml

scrape_configs:
  - job_name: besu
    metrics_path: /metrics
    static_configs:
      - targets: ['besu:9545']
  - job_name: teku
    static_configs:
      - targets: ['teku:8008']
  - job_name: geth
    metrics_path: /debug/metrics/prometheus
    static_configs:
      - targets: ['geth:6060']
  - job_name: lighthouse
    static_configs:
      - targets: ['lighthouse:5054']
  - job_name: prysm-validator
    static_configs:
      - targets: ['prysm-validator:8081']
  - job_name: remote-vc
    static_configs:
      - targets: ['remote-vc:8008']
  - job_name: web3signer
    static_configs:
      - targets: ['web3signer:9001']
  # machine monitoring
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
  # container monitoring
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
  # rpc gateway (SLO measurement point) + synthetic prober
  - job_name: gateway
    static_configs:
      - targets: ['gateway:8405']
  - job_name: rpc-prober
    static_configs:
      - targets: ['prober:9600']
