global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml
  - /etc/prometheus/slo-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: besu
    metrics_path: /metrics
    static_configs:
      - targets: ['besu:9545']
  - job_name: teku
    static_configs:
      - targets: ['teku:8008']
  - job_name: geth
    metrics_path: /debug/metrics/prometheus
    static_configs:
      - targets: ['geth:6060']
  - job_name: lighthouse
    static_configs:
      - targets: ['lighthouse:5054']
  - job_name: prysm-validator
    static_configs:
      - targets: ['prysm-validator:8081']
  - job_name: remote-vc
    static_configs:
      - targets: ['remote-vc:8008']
  - job_name: web3signer
    static_configs:
      - targets: ['web3signer:9001']
  # machine monitoring
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
  # container monitoring
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
  # the monitoring stack watching itself: a collector that stops collecting,
  # a rule engine that falls behind, or a delivery path that goes quiet are
  # all silent failures otherwise
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
  - job_name: alertmanager
    static_configs:
      - targets: ['alertmanager:9093']
  - job_name: alert-sink
    static_configs:
      - targets: ['alert-sink:9099']
  - job_name: grafana
    static_configs:
      - targets: ['grafana:3000']
  - job_name: loki
    static_configs:
      - targets: ['loki:3100']
  - job_name: promtail
    static_configs:
      - targets: ['promtail:9080']

  # rpc gateway (SLO measurement point) + synthetic prober
  - job_name: gateway
    static_configs:
      - targets: ['gateway:8405']
  - job_name: rpc-prober
    static_configs:
      - targets: ['prober:9600']
