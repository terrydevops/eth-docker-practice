# shared monitoring: metrics (prometheus + grafana) + logs (loki + promtail).
# included by each environment via COMPOSE_FILE; joins that environment's
# network so prometheus can reach the node containers by name and promtail
# can tail their logs.

services:
  prometheus:
    image: "${PROMETHEUS_IMAGE:-prom/prometheus:v3.1.0}"
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports: ["${PROMETHEUS_PORT:-9090}:9090"]
    volumes:
      - ../monitoring/metrics/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/metrics/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ../monitoring/metrics/prometheus/slo-rules.yml:/etc/prometheus/slo-rules.yml:ro

  # alert delivery. without this the rules fire into the prometheus UI and
  # nobody hears them - grouping, inhibition and severity routing live here
  alertmanager:
    image: "${ALERTMANAGER_IMAGE:-prom/alertmanager:v0.28.1}"
    container_name: alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports: ["${ALERTMANAGER_PORT:-9093}:9093"]
    volumes:
      - ../monitoring/metrics/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    mem_limit: 128m

  # stands in for slack/pagerduty on a devnet: logs every notification and
  # counts them, so the delivery path itself is observable
  alert-sink:
    image: "${PROBER_IMAGE:-node:26.5.0-alpine}"
    container_name: alert-sink
    restart: unless-stopped
    command: ["node", "/app/alert-sink.mjs"]
    volumes:
      - ../monitoring/metrics/alertmanager/alert-sink.mjs:/app/alert-sink.mjs:ro
    mem_limit: 64m

  grafana:
    image: "${GRAFANA_IMAGE:-grafana/grafana:11.4.0}"
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    ports: ["${GRAFANA_PORT:-3000}:3000"]
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [prometheus]

  loki:
    image: "${LOKI_IMAGE:-grafana/loki:3.5.1}"
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ../monitoring/logs/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    mem_limit: 512m

  promtail:
    image: "${PROMTAIL_IMAGE:-grafana/promtail:3.5.1}"
    container_name: promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml -config.expand-env=true
    environment:
      - NET_NAME=${NET_NAME:-}
    volumes:
      - ../monitoring/logs/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on: [loki]
    mem_limit: 128m

  # machine monitoring: host cpu/mem/disk/net/filesystem
  node-exporter:
    image: "${NODE_EXPORTER_IMAGE:-prom/node-exporter:v1.9.1}"
    container_name: node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    pid: host
    volumes:
      - /:/host:ro
    mem_limit: 128m

  # container monitoring: per-container cpu/mem/net/fs (docker).
  # pinned to v0.49: the last release with the docker runtime handler -
  # v0.50+ only sees raw cgroups on a docker engine (no container names,
  # no spec limits), which breaks the Containers dashboard and alerts.
  cadvisor:
    image: "${CADVISOR_IMAGE:-gcr.io/cadvisor/cadvisor:v0.49.2}"
    container_name: cadvisor
    restart: unless-stopped
    command:
      - --docker_only=true
      - --store_container_labels=false
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      # the socket is bound as a file: on hosts where /var/run is a symlink,
      # binding the directory hides the socket and the docker factory fails
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    mem_limit: 256m

volumes:
  alertmanager-data:
  loki-data:
