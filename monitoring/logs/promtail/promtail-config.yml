server:
  http_listen_port: 9080
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # auto-discover containers on this host and tail their logs. scoped to this
  # environment's docker network (NET_NAME, expanded via -config.expand-env)
  # so a shared host only ingests this stack's containers, not unrelated ones.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # keep only containers attached to this environment's network
      - source_labels: ['__meta_docker_container_network_mode']
        regex: '.*${NET_NAME}.*'
        action: keep
      # container name -> label "container"
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      # compose service -> label "service"
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      # compose project -> label "project"
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: project
